<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Soal - Ruang Belajar Murid</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <!-- Google Fonts & FontAwesome untuk Ikon -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* --- RESET & BASE STYLE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f4f7fc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .kuis-online-container { 
            max-width: 650px; 
            width: 100%;
            margin: 20px auto; 
            padding: 0 15px; 
        }

        .kuis-box { 
            background: #ffffff; 
            border: 1px solid #e2e8f0; 
            border-radius: 24px; 
            padding: 35px; 
            box-shadow: 0 15px 35px rgba(30, 58, 138, 0.04); 
            position: relative; 
            overflow: hidden; 
        }

        .kuis-box::before { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 6px; 
            background: linear-gradient(to right, #1e3a8a, #a855f7); 
        }

        .kuis-header { 
            text-align: center; 
            margin-bottom: 25px; 
        }

        .kuis-header h2 { 
            color: #1e3a8a; 
            font-weight: 800; 
            margin-bottom: 6px; 
            font-size: 1.6rem;
        }

        .kuis-header p { 
            color: #64748b; 
            font-size: 0.95rem; 
        }
        
        .form-group { 
            margin-bottom: 20px; 
            display: flex; 
            flex-direction: column; 
        }

        .form-group label { 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: #475569; 
            margin-bottom: 8px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select { 
            padding: 14px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 0.95rem; 
            outline: none; 
            transition: all 0.2s; 
            color: #334155; 
            font-family: inherit;
        }

        .form-group input:focus, .form-group select:focus { 
            border-color: #1e3a8a; 
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.08);
        }

        .form-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        
        .btn-container {
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }

        .btn-primary { 
            width: 100%; 
            background: linear-gradient(135deg, #1e3a8a 0%, #a855f7 100%); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 14px; 
            font-size: 1rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s; 
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.2); 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.3); 
        }

        .btn-secondary {
            background: #64748b;
            box-shadow: 0 4px 15px rgba(100, 116, 139, 0.2); 
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 20px rgba(100, 116, 139, 0.3); 
        }
        
        .text-center { text-align: center; }

        .spinner { 
            width: 45px; 
            height: 45px; 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #a855f7; 
            border-radius: 50%; 
            margin: 25px auto; 
            animation: spin 1s linear infinite; 
        }

        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        .quiz-progress-bar { 
            width: 100%; 
            height: 6px; 
            background: #e2e8f0; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            overflow: hidden; 
        }

        #progress-indicator { 
            height: 100%; 
            width: 0%; 
            background: linear-gradient(to right, #1e3a8a, #a855f7); 
            transition: width 0.3s; 
        }

        .quiz-meta-info { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.8rem; 
            font-weight: 700; 
            color: #94a3b8; 
            margin-bottom: 20px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .soal-container { 
            margin-bottom: 25px; 
        }

        .soal-container h3 { 
            font-size: 1.2rem; 
            color: #1e3a8a; 
            line-height: 1.6; 
            font-weight: 700; 
        }

        .soal-img { 
            max-width: 100%; 
            max-height: 220px; 
            border-radius: 14px; 
            margin-bottom: 15px; 
            display: block; 
            object-fit: contain; 
        }
        
        .opsi-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .opsi-btn { 
            display: flex; 
            align-items: center; 
            text-align: left; 
            padding: 14px 18px; 
            border: 2px solid #e2e8f0; 
            border-radius: 14px; 
            background: #fff; 
            font-size: 0.95rem; 
            font-weight: 600; 
            color: #475569; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-family: inherit;
        }

        .opsi-btn:hover { 
            border-color: #a855f7; 
            background: #faf5ff; 
            color: #a855f7; 
        }

        .badge-opsi { 
            display: inline-block; 
            width: 28px; 
            height: 28px; 
            background: #f1f5f9; 
            text-align: center; 
            line-height: 28px; 
            border-radius: 8px; 
            font-weight: 800; 
            font-size: 0.85rem; 
            margin-right: 12px; 
            color: #64748b; 
        }

        .opsi-btn:hover .badge-opsi { 
            background: #a855f7; 
            color: #fff; 
        }
        
        .result-icon { font-size: 4.5rem; margin-bottom: 15px; }
        .result-icon.lulus { color: #10b981; }
        .result-icon.remedial { color: #ef4444; }
        #res-status { font-weight: 800; color: #1e3a8a; margin-bottom: 5px; font-size: 1.5rem;}
        #res-message { color: #64748b; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5; }
        
        .skor-badge-container { 
            background: #f8fafc; 
            border: 2px dashed #cbd5e1; 
            border-radius: 18px; 
            padding: 15px; 
            max-width: 180px; 
            margin: 0 auto 30px; 
            display: flex; 
            flex-direction: column; 
        }

        .skor-title { font-size: 0.8rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        .skor-value { font-size: 3.5rem; font-weight: 800; color: #1e3a8a; }

        @media (max-width: 500px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
            .kuis-box { padding: 25px 20px; }
            .soal-container h3 { font-size: 1.05rem; }
            .opsi-btn { font-size: 0.9rem; padding: 12px; }
        }
    </style>
</head>
<body>

<div class="kuis-online-container">
    <!-- STEP 1: FORM DATA DIRI (HANYA NAMA) & FILTER -->
    <div id="setup-section" class="kuis-box">
        <div class="kuis-header">
            <h2><i class="fa-solid fa-user-astronaut"></i> Mulai Uji Pemahaman</h2>
            <p>Tulis namamu, pilih materi, lalu kerjakan kuisnya dengan jujur ya!</p>
        </div>
        
        <div class="form-group">
            <label><i class="fa-solid fa-user"></i> Nama Lengkap</label>
            <input type="text" id="siswa-nama" placeholder="Tulis nama lengkapmu di sini..." required>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label><i class="fa-solid fa-graduation-cap"></i> Pilih Kelas</label>
                <select id="select-kelas" onchange="updateMapelOptions()">
                    <option value="">-- Pilih Kelas --</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-book-bookmark"></i> Pilih Mata Pelajaran</label>
                <select id="select-mapel" onchange="updateBabOptions()" disabled>
                    <option value="">-- Pilih Mapel --</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label><i class="fa-solid fa-layer-group"></i> Pilih Bab</label>
            <select id="select-bab" disabled>
                <option value="">-- Pilih Bab --</option>
            </select>
        </div>
        
        <div class="btn-container">
            <a href="../" class="btn-primary btn-secondary"><i class="fa-solid fa-arrow-left"></i> Beranda</a>
            <button id="btn-start" class="btn-primary" onclick="loadQuestions()"><i class="fa-solid fa-play"></i> Mulai Kuis</button>
        </div>
    </div>

    <!-- STEP 2: LOADING SCREEN -->
    <div id="loading-section" class="kuis-box text-center" style="display:none;">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: #64748b; font-weight: 500;">Mempersiapkan kuis interaktif, mohon tunggu...</p>
    </div>

    <!-- STEP 3: AREA SOAL -->
    <div id="quiz-section" class="kuis-box" style="display:none;">
        <div class="quiz-progress-bar"><div id="progress-indicator"></div></div>
        <div class="quiz-meta-info">
            <span id="quiz-info-materi">Loading...</span>
            <span id="quiz-info-number">Soal</span>
        </div>
        
        <div class="soal-container">
            <div id="soal-gambar-container"></div>
            <h3 id="soal-teks">Pertanyaan sedang dimuat...</h3>
        </div>
        
        <div class="opsi-list">
            <button class="opsi-btn" onclick="selectOption('A')"><span class="badge-opsi">A</span> <span id="text-opsi-a"></span></button>
            <button class="opsi-btn" onclick="selectOption('B')"><span class="badge-opsi">B</span> <span id="text-opsi-b"></span></button>
            <button class="opsi-btn" onclick="selectOption('C')"><span class="badge-opsi">C</span> <span id="text-opsi-c"></span></button>
            <button class="opsi-btn" onclick="selectOption('D')"><span class="badge-opsi">D</span> <span id="text-opsi-d"></span></button>
        </div>
    </div>

    <!-- STEP 4: HASIL SKOR AKHIR -->
    <div id="result-section" class="kuis-box text-center" style="display:none;">
        <div class="result-icon" id="res-icon"><i class="fa-solid fa-trophy"></i></div>
        <h2 id="res-status">Hasil Kuis</h2>
        <p id="res-message">Proses pengiriman nilai...</p>
        
        <div class="skor-badge-container">
            <span class="skor-title">Nilai Kamu</span>
            <span class="skor-value" id="res-skor">0</span>
        </div>
        
        <div class="btn-container">
            <a href="../" class="btn-primary btn-secondary"><i class="fa-solid fa-house"></i> Beranda</a>
            <button class="btn-primary" onclick="resetQuiz()"><i class="fa-solid fa-rotate-right"></i> Ulangi Latihan</button>
        </div>
    </div>
</div>

<!-- ================= JAVASCRIPT APP LOGIC ================= -->
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxoB5JYdZ_YoE9-5Z4etI8yqJwH_MeYskwC6UPB8sNYlkZKPV1vbNjnD8EcdJdg_WWbTQ/exec";
    
    let metadataRelations = {};
    let questionsData = [];
    let currentQuestionIndex = 0;
    let scoreCount = 0;
    
    document.addEventListener("DOMContentLoaded", function() {
        fetchMetadata();
    });

    function fetchMetadata() {
        fetch(`${WEB_APP_URL}?action=getMetadata`)
            .then(res => res.json())
            .then(response => {
                if(response.status === "success") {
                    metadataRelations = response.data.relations;
                    populateKelasOptions();
                }
            }).catch(err => alert("Gagal terhubung dengan server database soal."));
    }

    function populateKelasOptions() {
        const selectKelas = document.getElementById("select-kelas");
        selectKelas.innerHTML = '<option value="">-- Pilih Kelas --</option>';
        Object.keys(metadataRelations).forEach(kelas => {
            selectKelas.innerHTML += `<option value="${kelas}">${kelas}</option>`;
        });
    }

    function updateMapelOptions() {
        const kelas = document.getElementById("select-kelas").value;
        const selectMapel = document.getElementById("select-mapel");
        const selectBab = document.getElementById("select-bab");
        
        selectMapel.innerHTML = '<option value="">-- Pilih Mapel --</option>';
        selectBab.innerHTML = '<option value="">-- Pilih Bab --</option>';
        selectBab.disabled = true;
        
        if(!kelas) { selectMapel.disabled = true; return; }
        
        Object.keys(metadataRelations[kelas]).forEach(mapel => {
            selectMapel.innerHTML += `<option value="${mapel}">${mapel}</option>`;
        });
        selectMapel.disabled = false;
    }

    function updateBabOptions() {
        const kelas = document.getElementById("select-kelas").value;
        const mapel = document.getElementById("select-mapel").value;
        const selectBab = document.getElementById("select-bab");
        
        selectBab.innerHTML = '<option value="">-- Pilih Bab --</option>';
        
        if(!mapel) { selectBab.disabled = true; return; }
        
        metadataRelations[kelas][mapel].forEach(bab => {
            selectBab.innerHTML += `<option value="${bab}">${bab}</option>`;
        });
        selectBab.disabled = false;
    }

    function loadQuestions() {
        const nama = document.getElementById("siswa-nama").value.trim();
        const kelas = document.getElementById("select-kelas").value;
        const mapel = document.getElementById("select-mapel").value;
        const bab = document.getElementById("select-bab").value;
        
        if(!nama || !kelas || !mapel || !bab) {
            alert("Harap tulis nama dan pilih materi kuis terlebih dahulu!");
            return;
        }
        
        document.getElementById("setup-section").style.display = "none";
        document.getElementById("loading-section").style.display = "block";
        
        fetch(`${WEB_APP_URL}?action=getQuestions&kelas=${encodeURIComponent(kelas)}&bab=${encodeURIComponent(bab)}`)
            .then(res => res.json())
            .then(response => {
                document.getElementById("loading-section").style.display = "none";
                if(response.status === "success" && response.data.length > 0) {
                    questionsData = response.data;
                    startQuiz();
                } else {
                    alert("Soal belum tersedia untuk pilihan materi ini.");
                    document.getElementById("setup-section").style.display = "block";
                }
            }).catch(err => {
                document.getElementById("loading-section").style.display = "none";
                document.getElementById("setup-section").style.display = "block";
                alert("Kesalahan memuat data soal.");
            });
    }

    function startQuiz() {
        currentQuestionIndex = 0;
        scoreCount = 0;
        document.getElementById("quiz-section").style.display = "block";
        showQuestion();
    }

    function showQuestion() {
        const currentQuestion = questionsData[currentQuestionIndex];
        const totalSoal = questionsData.length;
        const percent = ((currentQuestionIndex + 1) / totalSoal) * 100;
        
        document.getElementById("progress-indicator").style.width = percent + "%";
        document.getElementById("quiz-info-number").innerText = `Soal ${currentQuestionIndex + 1} dari ${totalSoal}`;
        document.getElementById("quiz-info-materi").innerText = `${currentQuestion.mapel} - ${currentQuestion.bab}`;
        document.getElementById("soal-teks").innerText = currentQuestion.soal;
        
        const imgContainer = document.getElementById("soal-gambar-container");
        imgContainer.innerHTML = "";
        if(currentQuestion.gambar && currentQuestion.gambar.startsWith("http")) {
            imgContainer.innerHTML = `<img src="${currentQuestion.gambar}" class="soal-img" alt="Gambar Soal">`;
        }
        
        document.getElementById("text-opsi-a").innerText = currentQuestion.opsi_a;
        document.getElementById("text-opsi-b").innerText = currentQuestion.opsi_b;
        document.getElementById("text-opsi-c").innerText = currentQuestion.opsi_c;
        document.getElementById("text-opsi-d").innerText = currentQuestion.opsi_d;
    }

    function selectOption(jawabanDipilih) {
        const currentQuestion = questionsData[currentQuestionIndex];
        if(String(jawabanDipilih).trim().toUpperCase() === String(currentQuestion.jawaban).trim().toUpperCase()) {
            scoreCount++;
        }
        
        currentQuestionIndex++;
        if(currentQuestionIndex < questionsData.length) {
            showQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        document.getElementById("quiz-section").style.display = "none";
        document.getElementById("loading-section").style.display = "block";
        
        const nama = document.getElementById("siswa-nama").value.trim();
        const kelas = document.getElementById("select-kelas").value;
        const mapel = document.getElementById("select-mapel").value;
        const bab = document.getElementById("select-bab").value;
        
        const nilaiAkhir = Math.round((scoreCount / questionsData.length) * 100);
        const statusKelulusan = nilaiAkhir >= 80 ? "Lulus" : "Remedial";
        
        const payload = {
            action: "submitScore",
            nama: nama,
            kelas: kelas,
            mapel: mapel,
            bab: bab,
            skor: nilaiAkhir,
            status: statusKelulusan
        };
        
        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(() => {
            showResultView(nilaiAkhir, statusKelulusan);
        }).catch(() => {
            showResultView(nilaiAkhir, statusKelulusan);
        });
    }

    function showResultView(skor, status) {
        document.getElementById("loading-section").style.display = "none";
        document.getElementById("result-section").style.display = "block";
        document.getElementById("res-skor").innerText = skor;
        const iconDiv = document.getElementById("res-icon");
        
        if(status === "Lulus") {
            document.getElementById("res-status").innerText = "Hore! Kamu Lulus ✨";
            document.getElementById("res-message").innerText = "Hebat sekali! Teruskan semangat belajarmu.";
            iconDiv.className = "result-icon lulus";
            iconDiv.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
        } else {
            document.getElementById("res-status").innerText = "Yuk Belajar Lagi! 💪";
            document.getElementById("res-message").innerText = "Nilaimu masih di bawah KKM 80. Coba ulangi kuis lagi ya.";
            iconDiv.className = "result-icon remedial";
            iconDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
        }
    }

    function resetQuiz() {
        document.getElementById("result-section").style.display = "none";
        document.getElementById("setup-section").style.display = "block";
        document.getElementById("select-bab").innerHTML = '<option value="">-- Pilih Bab --</option>';
        document.getElementById("select-bab").disabled = true;
        document.getElementById("select-mapel").selectedIndex = 0;
        document.getElementById("select-kelas").selectedIndex = 0;
        document.getElementById("select-mapel").disabled = true;
    }
</script>
</body>
</html>
